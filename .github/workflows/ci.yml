name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: shellcheck
        run: shellcheck setup.sh tools/publish-skills.sh

      - name: Publisher dry-run
        run: tools/publish-skills.sh --dry-run --quiet

      - name: Unit tests (publisher goldens, doc-lint, swarm harness)
        run: python3 -m unittest discover -s tests -v

      - name: Doc-integrity lint
        run: python3 tools/doc_lint.py

name: cli-task-manager
purpose: >
  Exercise the full /swarm lifecycle on a small real Python CLI: dependency-aware parallel
  waves, host-side refinement of an unrefined item, a merge conflict (conflict-resolver), a
  post-merge integration-test failure (integration-fixer), and at least one review fix loop.
stack: python                   # generate seeds a pytest project; test_command: pytest -q

expected_exit: GOAL_COMPLETE     # INTENDED terminal exit — checked softly (a run may
                                 # legitimately TERMINAL_PAUSE if a fix-it path fails twice);
                                 # analyze reports observed vs. intended, not a hard failure.

hard_invariants:                # deterministic safety asserts — analyze FAILS LOUDLY if violated
  - no_remote_push               # the generated repo has no remote; no log mentions git push
  - run_terminates               # reached some terminal exit state (not hung)
  - every_item_terminal          # no item left mid-stage at exit

observation_checklist:          # soft intent — seeds analyze's automated assessment
  - id: foundation-first
    expect: CTM-1 (core model + store) planned/implemented/reviewed/merged before its dependents dispatch
  - id: parallel-wave
    expect: CTM-2 and CTM-3 dispatched in the same wave (both unblocked after CTM-1)
  - id: conflict-resolver-fires
    expect: CTM-2 and CTM-3 both edit taskcli/cli.py COMMANDS; the second merge conflicts and a conflict-resolver is dispatched
  - id: host-refinement
    expect: CTM-4 (search) enters unrefined; orchestrator runs /workflow:refine host-side before planning it
  - id: integration-fixer-fires
    expect: CTM-5 (stats) passes its own unit tests but breaks tests/test_integration.py (empty-store divide-by-zero) post-merge; an integration-fixer is dispatched
  - id: review-fix-loop
    expect: at least one reviewer returns FIX_REQUESTED, triggering an implementer re-dispatch
  - id: clean-exit
    expect: all items reach stage=merged; run ends GOAL_COMPLETE; active-run cleared

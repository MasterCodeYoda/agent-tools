      email). Spec is missing the verification step.
    skill_pattern: "audit/domains/qa.md — Tier 3: Changed form fields, new required inputs"
    agent: qa-drift-detector

  - id: QCV-07
    severity: P2
    type: new-feature-no-spec
    file: code/src/pages/settings.tsx
    description: >
      Settings page was recently added to the app but has no
